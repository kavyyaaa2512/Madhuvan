<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Madhuvan Visuals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #faf9f6; --text-dark: #1a1a1a; --accent: #bda27e; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, .serif { font-family: 'Cormorant Garamond', serif; font-weight: 400; }
        a { text-decoration: none; color: var(--text-dark); transition: color 0.3s ease; }

        /* Dark Header for inside pages */
        header { background-color: var(--text-dark); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo img { height: 60px; width: auto; filter: brightness(0) invert(1); }
        nav { display: flex; gap: 30px; }
        nav a { color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; }
        nav a:hover { color: var(--accent); }

        /* Page Title */
        .page-header { text-align: center; padding: 80px 20px 40px; }
        .page-header h1 { font-size: clamp(3rem, 6vw, 5rem); margin-bottom: 10px; }
        .page-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; color: #666; }

        /* --- MASONRY GRID (Pinterest Style) --- */
        .masonry-container {
            padding: 0 5% 100px;
            /* Creates columns. Change column count for desktop here */
            column-count: 3;
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid; /* Prevents image from breaking across columns */
            margin-bottom: 20px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 4px; /* Slight premium rounded corners */
        }

        .gallery-item img {
            width: 100%;
            display: block; /* Removes weird spacing below images */
            transition: transform 0.6s ease;
        }

        /* Hover Overlay */
        .gallery-item::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0); transition: background 0.4s ease; pointer-events: none;
        }

        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-item:hover::after { background: rgba(0,0,0,0.15); }

        /* --- Lightbox --- */
        .lightbox {
            display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content { max-width: 90%; max-height: 90vh; object-fit: contain; transform: scale(0.95); transition: transform 0.3s; }
        .lightbox.active .lightbox-content { transform: scale(1); }
        .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 50px; cursor: pointer; }
        .close:hover { color: var(--accent); }

        /* Responsive Columns */
        @media (max-width: 900px) { .masonry-container { column-count: 2; } }
        @media (max-width: 600px) { 
            header { flex-direction: column; gap: 15px; }
            nav { flex-wrap: wrap; justify-content: center; gap: 15px; }
            .masonry-container { column-count: 1; } 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/Madhuvan-Studio.png" alt="Madhuvan Visuals Logo"></a>
        </div>
        <nav> 
            <a href="index.html">Home</a>
            <a href="portfolio.html" style="color: var(--accent);">Portfolio</a>
            <a href="mailto:Pathakkavya@gmail.com">Contact</a>
        </nav>
    </header>

    <div class="page-header">
        <h1>Our Masterpieces</h1>
        <p>A Curated Collection of Cinematic Memories</p>
    </div>

    <!-- MASONRY GALLERY AREA -->
    <div class="masonry-container">
        
        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3503.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3503.JPG" alt="Wedding Couple">
        </div>
        
        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3804.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3804.JPG" alt="Candid">
        </div>

        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3456.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3456.JPG" alt="Bridal">
        </div>

        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC4000.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC4000.JPG" alt="Couple">
        </div>

        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC4016.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC4016.JPG" alt="Cinematic Shot">
        </div>

        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3808.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3808.JPG" alt="Details">
        </div>

        <div class="gallery-item" onclick="openLightbox('https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3912.JPG')">
            <img src="https://raw.githubusercontent.com/kavyyaaa2512/MVS/main/_DSC3912.JPG" alt="Event">
        </div>

    </div>

    <!-- LIGHTBOX HTML -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="close" onclick="closeLightbox(event)">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        var lightbox = document.getElementById("lightbox");
        var lightboxImg = document.getElementById("lightbox-img");

        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc;
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden"; // Prevents background scrolling
        }

        function closeLightbox(e) {
            // Close if user clicks the 'X' OR anywhere outside the image
            if(e.target === lightbox || e.target.classList.contains('close')) {
                lightbox.classList.remove("active");
                document.body.style.overflow = "auto";
            }
        }
    </script>
</body>
</html>
